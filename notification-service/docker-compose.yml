version: "3"

services:
  notification-service:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
      - db
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE: notifications
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notifications
