version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ticket_info_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - ticket_info_db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticket_info_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  ticket-service:
    build: .
    container_name: ticket_service_app
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/ticket_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./qr_codes:/service/qr_codes

volumes:
  ticket_info_db_data:
