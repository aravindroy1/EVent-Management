apiVersion: v1
kind: Secret
metadata:
  name: event-management-secrets
  namespace: event-management
type: Opaque
stringData:
  # MySQL config (Common)
  MYSQL_ROOT_PASSWORD: "rootpassword"
  MYSQL_PASSWORD: "password"
  
  # PostgreSQL config (Common)
  POSTGRES_PASSWORD: "postgrespassword"
  
  # JWT Secrets
  JWT_SECRET: "my_shared_super_secret_key_change_in_prod"
  SECRET_KEY: "my_shared_super_secret_key_change_in_prod"

  # Email for notification service
  EMAIL_USER: "test@example.com"
  EMAIL_PASSWORD: "testpassword"

  # Shared Database Connection Strings (Optional, often constructed dynamically but provided for fallback)
  # Some services like `payment-service` directly require DATABASE_URL
  MYSQL_DATABASE_URL_PAYMENT: "mysql+pymysql://root:rootpassword@db-mysql.event-management.svc.cluster.local:3306/payment_service"
  POSTGRES_DATABASE_URL_EVENT: "postgresql://postgres:postgrespassword@db-postgres.event-management.svc.cluster.local:5432/event_db"
  POSTGRES_DATABASE_URL_TICKET: "postgresql+asyncpg://postgres:postgrespassword@db-postgres.event-management.svc.cluster.local:5432/ticket_db"
  
  # RabbitMQ URL
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.event-management.svc.cluster.local:5672/"
