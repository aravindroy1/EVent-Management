apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: event-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: aravindroy1/eventservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: event-management-secrets
                  key: POSTGRES_DATABASE_URL_EVENT
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: event-management-secrets
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: event-management-config
                  key: ALGORITHM
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: event-management
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30002
  selector:
    app: event-service
