apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: event-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: aravindroy1/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: event-management-config
                  key: MYSQL_HOST
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: event-management-config
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-management-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: event-management-config
                  key: MYSQL_DB_USER
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: event-management-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: event-management-secrets
                  key: RABBITMQ_URL
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: event-management
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001
  selector:
    app: user-service
