version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_pass
      POSTGRES_DB: event_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: eventservice_api:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://event_user:event_pass@db:5432/event_db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY env var must be set — must match UserService SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
